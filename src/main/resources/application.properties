spring.application.name=HealthCare
server.port=${PORT:8080}

# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/healthcare?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=2002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cache
spring.cache.type=simple

# Dťsactiver complŤtement Redis
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT
jwt.secret=${JWT_SECRET:MaCleSecreteSuperLongueEtSecurisee1234567890!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true